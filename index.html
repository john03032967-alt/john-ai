<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>John AI</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#0d1117;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:100%;
max-width:900px;
height:100vh;
display:flex;
flex-direction:column;
background:#161b22;
}

header{
padding:18px;
font-size:24px;
font-weight:bold;
text-align:center;
background:#21262d;
border-bottom:1px solid #30363d;
}

#chat{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:15px;
}

.message{
padding:14px;
border-radius:12px;
max-width:80%;
word-wrap:break-word;
line-height:1.5;
}

.user{
background:#238636;
align-self:flex-end;
}

.bot{
background:#30363d;
align-self:flex-start;
}

.bottom{
display:flex;
padding:15px;
background:#21262d;
border-top:1px solid #30363d;
}

input{
flex:1;
padding:15px;
font-size:16px;
background:#0d1117;
border:none;
outline:none;
color:white;
border-radius:10px;
}

button{
margin-left:10px;
padding:15px 22px;
background:#238636;
border:none;
color:white;
font-size:16px;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#2ea043;
}
</style>

</head>

<body>

<div class="container">

<header>
🤖 John AI
</header>

<div id="chat">

<div class="message bot">
Hello! I'm John AI. How can I help you today?
</div>

</div>

<div class="bottom">

<input
id="message"
type="text"
placeholder="Type your message...">

<button id="send">
Send
</button>

</div>

</div>
<script>
const API_URL = "https://john-ai-api-v2.john03032967.workers.dev/chat";

const chat = document.getElementById("chat");
const input = document.getElementById("message");
const send = document.getElementById("send");

async function sendMessage() {
  const text = input.value.trim();
  if (!text) return;

  chat.innerHTML += `<div class="message user">${text}</div>`;
  input.value = "";

  chat.innerHTML += `<div class="message bot" id="loading">Thinking...</div>`;
  chat.scrollTop = chat.scrollHeight;

  try {
    const response = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message: text
      })
    });

    const data = await response.json();

    document.getElementById("loading").remove();

    chat.innerHTML += `<div class="message bot">${data.reply || "No response"}</div>`;
    chat.scrollTop = chat.scrollHeight;

  } catch (e) {
    document.getElementById("loading").innerText = "Error connecting to John AI.";
  }
}

send.onclick = sendMessage;

input.addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    sendMessage();
  }
});
  </script>
</body>
</html>
